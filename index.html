<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Forge">
<meta name="theme-color" content="#0A0A0A">
<title>The Forge</title>
<link rel="apple-touch-icon" href="assets/img/icon-homescreen.png">
<link rel="icon" href="assets/img/logo.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/legacy.css">
</head>
<body>

<div id="app">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <img src="assets/img/logo.png" alt="" class="app-header__logo">
    <div class="app-header__title-group">
      <span class="app-header__title">THE FORGE</span>
      <span class="app-header__slogan">Rendirse es para las perras</span>
    </div>
    <div class="app-header__actions">
      <button class="app-header__notif-btn" id="notifBtn" aria-label="Notificaciones">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span class="app-header__notif-dot" id="notifDot"></span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="app-main">

    <!-- TAB: RUTINA (Inicio) -->
    <section class="tab-panel active" id="tab-rutina" data-tab="rutina"></section>

    <!-- TAB: EJERCICIOS (Base de datos) -->
    <section class="tab-panel" id="tab-ejercicios" data-tab="ejercicios"></section>

    <!-- TAB: PROGRESO -->
    <section class="tab-panel" id="tab-progreso" data-tab="progreso"></section>

    <!-- TAB: PESO -->
    <section class="tab-panel" id="tab-peso" data-tab="peso"></section>

    <!-- TAB: LEGADO -->
    <section class="tab-panel" id="tab-legado" data-tab="legado"></section>

    <!-- TAB: GRUPO -->
    <section class="tab-panel" id="tab-grupo" data-tab="grupo"></section>

  </main>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-target="rutina" aria-label="Rutina">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11M4 9V4h5M20 15v5h-5"/><circle cx="5.5" cy="5.5" r="2"/><circle cx="18.5" cy="18.5" r="2"/></svg>
      <span class="nav-item__label">Rutina</span>
    </button>
    <button class="nav-item" data-target="ejercicios" aria-label="Ejercicios">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 12a2 2 0 100-4 2 2 0 000 4zM4 12a2 2 0 110 4 2 2 0 010-4zM20 12a2 2 0 100-4 2 2 0 000 4zM20 12a2 2 0 110 4 2 2 0 010-4z"/><path d="M9 8v8M15 8v8"/></svg>
      <span class="nav-item__label">Ejerc.</span>
    </button>
    <button class="nav-item" data-target="progreso" aria-label="Progreso">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M10 19V5M16 19v-7M22 19H2"/></svg>
      <span class="nav-item__label">Prog.</span>
    </button>
    <button class="nav-item" data-target="peso" aria-label="Peso corporal">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M9 2h6"/></svg>
      <span class="nav-item__label">Peso</span>
    </button>
    <button class="nav-item" data-target="legado" aria-label="Legado">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 6.8L21 9l-5.2 4.5L17.5 21 12 17l-5.5 4 1.7-7.5L3 9l6.6-.2z"/></svg>
      <span class="nav-item__label">Legado</span>
    </button>
    <button class="nav-item" data-target="grupo" aria-label="Grupo">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3.2"/><circle cx="17" cy="9" r="2.6"/><path d="M2.5 20c.6-3.6 3-5.8 5.5-5.8s4.9 2.2 5.5 5.8M14.8 14.6c2 .3 3.7 2.1 4.2 5.4"/></svg>
      <span class="nav-item__label">Grupo</span>
    </button>
  </nav>

  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== MODAL ROOT (genérico, se llena por JS) ===== -->
  <div class="modal-overlay" id="modalRoot">
    <div class="modal-box" id="modalBox"></div>
  </div>

</div>

<!-- ===== FIREBASE SDK ===== -->
<script type="module" src="js/firebase-init.js"></script>

<!-- ===== APP SCRIPTS (orden importa) ===== -->
<script src="js/data.js"></script>
<script src="js/legacy.js"></script>
<script src="js/routines.js"></script>
<script src="js/streak.js"></script>
<script src="js/storage.js"></script>
<script src="js/number-picker.js"></script>
<script src="js/ui-helpers.js"></script>
<script src="js/tab-rutina.js"></script>
<script src="js/tab-ejercicios.js"></script>
<script src="js/tab-progreso.js"></script>
<script src="js/tab-peso.js"></script>
<script src="js/tab-legado.js"></script>
<script src="js/tab-grupo.js"></script>
<script src="js/app.js"></script>

</body>
</html>
